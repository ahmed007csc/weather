<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Погода в мире</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation"></div>
    <div class="glass-container">
        <header>
            <h1>Атмосфера</h1>
            <p>Узнайте погоду в любой точке мира</p>
        </header>
        
        <div class="controls">
            <div class="select-wrapper">
                <select id="country-select">
                    <option value="" disabled selected>Выберите страну</option>
                </select>
            </div>
            
            <div class="select-wrapper">
                <select id="city-select" disabled>
                    <option value="" disabled selected>Выберите город</option>
                </select>
            </div>
        </div>

        <div id="weather-card" class="weather-card hidden">
            <div class="weather-header">
                <h2 id="city-name">Город</h2>
                <p id="weather-desc">Ясно</p>
            </div>
            
            <div class="weather-body">
                <div class="temperature">
                    <span id="temp-value">--</span>°C
                </div>
                <div class="weather-icon" id="weather-icon">
                    ☀️
                </div>
            </div>
            
            <div class="weather-details">
                <div class="detail">
                    <span class="label">Ощущается как</span>
                    <span class="value" id="feels-like">--°C</span>
                </div>
                <div class="detail">
                    <span class="label">Влажность</span>
                    <span class="value" id="humidity">--%</span>
                </div>
                <div class="detail">
                    <span class="label">Ветер</span>
                    <span class="value" id="wind">-- м/с</span>
                </div>
            </div>
        </div>
        
        <div id="loader" class="loader hidden"></div>
        <div id="error-message" class="error-message hidden">Произошла ошибка при загрузке данных.</div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
